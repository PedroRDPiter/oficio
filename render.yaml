services:
  - type: web
    name: control-oficios-dpdu
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_FILE
        value: /var/data/oficios-data.json
      - key: DOCUMENTS_DIR
        value: /var/data/documentos
      - key: MAX_UPLOAD_BYTES
        value: "26214400"
    disk:
      name: oficios-data
      mountPath: /var/data
      sizeGB: 5
